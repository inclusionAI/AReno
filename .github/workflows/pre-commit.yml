name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --hook-stage manual

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: |
          pip install conventional-pre-commit
          FAILED=0
          for SHA in $(git log --no-merges --format=%H origin/${{ github.base_ref }}..HEAD); do
            git log --format=%B -1 "$SHA" > /tmp/commit_msg
            if ! conventional-pre-commit feat fix docs style refactor perf test build ci chore revert /tmp/commit_msg; then
              echo "❌ Bad commit: $(git log --format=%s -1 "$SHA")"
              FAILED=1
            fi
          done
          exit $FAILED
