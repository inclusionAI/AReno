name: CPU Unit Tests

on:
  push:
    branches:
      - main
    paths:
      - "areno/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/cpu_unit_tests.yml"
  pull_request:
    branches:
      - main
    paths:
      - "areno/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/cpu_unit_tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unittest:
    name: unittest / python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      ARENO_CHECK_TOKEN_IDS: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade \
            pytest \
            psutil \
            numpy \
            pydantic \
            click \
            fastapi \
            openai \
            uvicorn \
            safetensors \
            transformers \
            huggingface-hub \
            datasets \
            tensorboard \
            tqdm
          python -m pip install --upgrade "torch>=2.6" --index-url https://download.pytorch.org/whl/cpu
          ARENO_BUILD_EXT=0 python -m pip install -e . --no-build-isolation --no-deps

      - name: Run unit tests
        run: python -m pytest tests/ -k cpu
